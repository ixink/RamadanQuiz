<!DOCTYPE html>
<html lang="bn" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>প্রোডাক্টিভ রমাদান ২.০ কুইজ প্রতিযোগিতা | DIU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --ramadan-green: #14532d;
      --ramadan-gold: #d4a017;
      --ramadan-dark: #0f172a;
      --ramadan-light: #f8fafc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Hind Siliguri', 'Noto Naskh Arabic', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--ramadan-light);
      min-height: 100vh;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 20px; }

    .banner {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      margin: 20px 0 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 2px solid var(--ramadan-gold);
    }

    h1, h2 { color: var(--ramadan-gold); text-align: center; margin-bottom: 1rem; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }

    .card {
      background: rgba(30, 41, 59, 0.92);
      border-radius: 16px;
      padding: 2.2rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(212,160,23,0.18);
    }

    .form-group { margin-bottom: 1.4rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #e2e8f0; }
    input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #1e293b;
      color: white;
      font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--ramadan-gold); box-shadow: 0 0 0 3px rgba(212,160,23,0.25); }

    button {
      background: var(--ramadan-green);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1.1rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.25s;
    }
    button:hover { background: #166534; transform: translateY(-1px); }

    .btn-start {
      background: var(--ramadan-gold);
      color: #0f172a;
      font-size: 1.3rem;
      padding: 16px 48px;
      margin: 2rem auto;
      display: block;
    }
    .btn-start:hover { background: #b8860b; }

    .timer {
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--ramadan-gold);
      text-align: center;
      margin: 1.5rem 0;
      background: rgba(20,83,45,0.25);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--ramadan-green);
    }

    .question { margin: 2rem 0; font-size: 1.18rem; line-height: 1.7; }
    .question strong { color: var(--ramadan-gold); }

    .options { display: grid; gap: 0.9rem; margin-top: 1.2rem; }
    .option-label {
      display: flex;
      align-items: center;
      background: #1e293b;
      padding: 14px 18px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .option-label:hover { background: #253549; border-color: #475569; }

    input[type="radio"] { margin-left: 12px; accent-color: var(--ramadan-gold); }

    .result-card { text-align: center; }
    .score-big { font-size: 4.8rem; font-weight: bold; color: var(--ramadan-gold); margin: 1rem 0; }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }
    .stat-box {
      background: rgba(20,83,45,0.3);
      padding: 1.2rem 2.2rem;
      border-radius: 12px;
      border: 1px solid var(--ramadan-green);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td { padding: 14px 16px; text-align: right; }
    th { background: var(--ramadan-green); color: white; }
    tr:nth-child(even) { background: rgba(255,255,255,0.03); }

    .highlight-1 { background: #d4a01722; }
    .highlight-2 { background: #cbd5e122; }
    .highlight-3 { background: #9ca3af22; }

    .section-title {
      color: var(--ramadan-gold);
      border-bottom: 2px solid var(--ramadan-gold);
      padding-bottom: 0.6rem;
      margin: 2.5rem 0 1.5rem;
      text-align: center;
    }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .banner { height: 160px; }
      .card { padding: 1.5rem; }
      .score-big { font-size: 3.6rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <img src="https://images.unsplash.com/photo-1581092160560-1c1e428e9d65?w=1200&auto=format&fit=crop&q=80" 
       alt="Ramadan Banner" class="banner">

  <h1>প্রোডাক্টিভ রমাদান - ২.০</h1>
  <h2>কুইজ প্রতিযোগিতা</h2>
  <p style="text-align:center; color:#94a3b8; margin-bottom:2.5rem;">
    আয়োজনে: ঢাকা ইন্টারন্যাশনাল ইউনিভার্সিটি<br>
    সহযোগিতায়: ডিআইইউ মুসলিমস কমিউনিটি
  </p>

  <!-- Home Buttons -->
  <div style="text-align:center; margin:2rem 0;">
    <button class="btn-start" onclick="showRegistration()">কুইজে অংশগ্রহণ করুন</button>
    <button style="margin-left:1.5rem; background:#334155;" onclick="showRanking()">র‍্যাঙ্কিং দেখুন</button>
  </div>

  <!-- Registration -->
  <div id="registration" class="card hidden">
    <h2 class="section-title">অংশগ্রহণের তথ্য দিন</h2>
    <form id="regForm">
      <div class="form-group">
        <label for="name">নাম *</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label for="dept">বিভাগ *</label>
        <input type="text" id="dept" required placeholder="যেমন: CSE, BBA, EEE...">
      </div>
      <div class="form-group">
        <label for="email">ইমেইল *</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit" class="btn-start">কুইজ শুরু করুন</button>
    </form>
  </div>

  <!-- Quiz -->
  <div id="quiz" class="hidden">
    <div class="card">
      <div class="timer" id="timer">সময় বাকি: ০৮:০০</div>
      <div id="questionContainer"></div>
      <div style="text-align:center; margin-top:2.5rem;">
        <button id="submitQuizBtn">কুইজ জমা দিন</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="hidden">
    <div class="card result-card">
      <h2 class="section-title">আপনার ফলাফল</h2>
      <div class="score-big" id="scoreDisplay">0.00</div>

      <div class="stats">
        <div class="stat-box">
          <strong>সঠিক</strong><br><span id="correctCount">0</span>
        </div>
        <div class="stat-box">
          <strong>ভুল</strong><br><span id="wrongCount">0</span>
        </div>
        <div class="stat-box">
          <strong>এড়ানো</strong><br><span id="skipCount">0</span>
        </div>
      </div>

      <p style="margin:1.8rem 0; font-size:1.15rem;">
        সময় নিয়েছেন: <strong id="timeTaken"></strong>
      </p>

      <div style="margin-top:2rem;">
        <button onclick="showRanking()">র‍্যাঙ্কিং দেখুন</button>
        <button onclick="restart()" style="margin-right:1rem;">হোমে ফিরুন</button>
      </div>
    </div>
  </div>

  <!-- Ranking -->
  <div id="ranking" class="hidden">
    <div class="card">
      <h2 class="section-title">লাইভ র‍্যাঙ্কিং</h2>
      <table id="rankTable">
        <thead>
          <tr>
            <th>র‍্যাঙ্ক</th>
            <th>নাম</th>
            <th>বিভাগ</th>
            <th>নম্বর</th>
            <th>সময়</th>
          </tr>
        </thead>
        <tbody id="rankBody"></tbody>
      </table>

      <div style="text-align:center; margin-top:2.5rem;">
        <button onclick="showHome()">হোমে ফিরুন</button>
      </div>
    </div>
  </div>

</div>

<script>
// Questions array - 21 questions (new Q4 added)
const questions = [
  { q: "রাসূল ﷺ এর পুরো নাম কী?", options: ["আহমদ ইবনে আব্দুল্লাহ", "মুহাম্মদ ইবনে আব্দুল্লাহ", "মুহাম্মদ ইবনে উমর", "আব্দুল্লাহ ইবনে মুহাম্মদ"], ans: 1 },
  { q: "রাসূল ﷺ কোথায় জন্মগ্রহণ করেন?", options: ["মদিনা", "তাইফ", "মক্কা", "জেরুজালেম"], ans: 2 },
  { q: "রাসূল ﷺ কত সালে জন্মগ্রহণ করেন?", options: ["৫৬৫ খ্রি.", "৫৭০ খ্রি.", "৫৮০ খ্রি.", "৫৯০ খ্রি."], ans: 1 },
  // New Question 4 (changed - no overlap)
  { q: "রাসূল ﷺ কোন মাসে জন্মগ্রহণ করেন?", options: ["রজব", "রবিউল আউয়াল", "শাওয়াল", "রমাদান"], ans: 1 },
  { q: "রাসূল ﷺ এর মাতার নাম কী?", options: ["আমিনা বিনতে ওয়াহব", "হালিমা সাদিয়া", "খাদিজা বিনতে খুয়াইলিদ", "ফাতিমা বিনতে আসাদ"], ans: 0 },
  { q: "রাসূল ﷺ কত বছর বয়সে নবুয়ত লাভ করেন?", options: ["৩০ বছর", "৩৫ বছর", "৪০ বছর", "৪৫ বছর"], ans: 2 },
  { q: "প্রথম ওহী কোথায় নাজিল হয়েছিল?", options: ["উহুদ পাহাড়", "হেরা গুহা", "সাফা পাহাড়", "আরাফাত ময়দান"], ans: 1 },
  { q: "প্রথম ওহী কে নিয়ে এসেছিলেন?", options: ["জিবরাইল (আ.)", "মিকাইল (আ.)", "ইসরাফিল (আ.)", "আজরাইল (আ.)"], ans: 0 },
  { q: "রাসূল ﷺ এর প্রথম স্ত্রী কে ছিলেন?", options: ["আয়েশা বিনতে আবু বকর", "খাদিজা বিনতে খুয়াইলিদ", "হাফসা বিনতে উমর", "জয়নব বিনতে জাহশ"], ans: 1 },
  { q: "রাসূল ﷺ মদিনায় হিজরত করেন কত সালে?", options: ["৬১০ খ্রি.", "৬১৫ খ্রি.", "৬২২ খ্রি.", "৬৩০ খ্রি."], ans: 2 },
  { q: "মদিনার আগের নাম কী ছিল?", options: ["তাবুক", "ইয়াসরিব", "খায়বার", "বদর"], ans: 1 },
  { q: "রাসূল ﷺ কত বছর নবুয়তের দায়িত্ব পালন করেন?", options: ["২০ বছর", "২৩ বছর", "২৫ বছর", "৩০ বছর"], ans: 1 },
  { q: "হযরত ফাতিমা (রা.) কার স্ত্রী ছিলেন?", options: ["উসমান ইবনে আফফান", "আলী ইবনে আবি তালিব", "উমর ইবনে খাত্তাব", "তালহা ইবনে উবায়দুল্লাহ"], ans: 1 },
  { q: "রাসূল ﷺ এর সবচেয়ে ছোট ছেলে কে ছিলেন?", options: ["কাসিম", "আবদুল্লাহ", "ইবরাহিম", "হামজা"], ans: 2 },
  { q: "রাসূল ﷺ এর দাদার নাম কী?", options: ["আব্দুল মুত্তালিব", "হাশিম ইবনে আব্দে মানাফ", "আবু তালিব", "আব্বাস ইবনে আব্দুল মুত্তালিব"], ans: 0 },
  { q: "রাসূল ﷺ কোথায় ইন্তেকাল করেন?", options: ["মক্কা", "মদিনা", "তাইফ", "দামেস্ক"], ans: 1 },
  { q: "রাসূল ﷺ কত বছর বয়সে ইন্তেকাল করেন?", options: ["৬০ বছর", "৬২ বছর", "৬৩ বছর", "৬৫ বছর"], ans: 2 },
  { q: "রাসূল ﷺ এর উপাধি কী ছিল?", options: ["আল-আমিন", "আল-ফারুক", "আস-সিদ্দিক", "যুন-নুরাইন"], ans: 0 },
  { q: "ইসলামের প্রথম খলিফা কে ছিলেন?", options: ["উমর ইবনে খাত্তাব", "আলী ইবনে আবি তালিব", "আবু বকর", "উসমান ইবনে আফফান"], ans: 2 },
  { q: "বদর যুদ্ধ কত হিজরিতে হয়েছিল?", options: ["১ হিজরি", "২ হিজরি", "৩ হিজরি", "৫ হিজরি"], ans: 1 },
  { q: "মক্কা বিজয় (ফতহ মক্কা) কত হিজরিতে হয়েছিল?", options: ["৬ হিজরি", "৭ হিজরি", "৮ হিজরি", "৯ হিজরি"], ans: 2 }
];

const TOTAL_TIME = 8 * 60; // 480 seconds
let currentQuestion = 0;
let selectedAnswers = Array(questions.length).fill(-1);
let timerInterval;
let startTime;

// Storage Helpers
function getParticipants() {
  const data = localStorage.getItem("ramadanQuizParticipants");
  return data ? JSON.parse(data) : [];
}

function saveParticipant(p) {
  const list = getParticipants();
  list.push(p);
  localStorage.setItem("ramadanQuizParticipants", JSON.stringify(list));
}

// Navigation
function showHome() {
  document.querySelectorAll('.card, #registration, #quiz, #result, #ranking').forEach(el => el.classList.add('hidden'));
}

function showRegistration() {
  showHome();
  document.getElementById("registration").classList.remove('hidden');
}

function showQuiz() {
  showHome();
  document.getElementById("quiz").classList.remove('hidden');
}

function showResult() {
  showHome();
  document.getElementById("result").classList.remove('hidden');
}

function showRanking() {
  showHome();
  document.getElementById("ranking").classList.remove('hidden');
  renderRanking();
}

// Timer
function startTimer() {
  let timeLeft = TOTAL_TIME;
  const timerEl = document.getElementById("timer");

  timerInterval = setInterval(() => {
    timeLeft--;
    const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
    const s = String(timeLeft % 60).padStart(2, '0');
    timerEl.textContent = `সময় বাকি: ${m}:${s}`;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      submitQuiz(true);
    }
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

// Quiz Logic
function loadQuestion(idx) {
  const q = questions[idx];
  let html = `<div class="question"><strong>প্রশ্ন ${idx+1}/${questions.length}:</strong><br>${q.q}</div>`;
  html += '<div class="options">';

  q.options.forEach((opt, i) => {
    const checked = selectedAnswers[idx] === i ? 'checked' : '';
    html += `
      <label class="option-label">
        <input type="radio" name="q${idx}" value="${i}" ${checked}>
        ${String.fromCharCode(1072 + i)}) ${opt}
      </label>`;
  });

  html += '</div>';
  document.getElementById("questionContainer").innerHTML = html;

  document.querySelectorAll(`input[name="q${idx}"]`).forEach(radio => {
    radio.addEventListener('change', e => {
      selectedAnswers[idx] = parseInt(e.target.value);
    });
  });
}

function submitQuiz(timeUp = false) {
  stopTimer();

  let score = 0;
  let correct = 0;
  let wrong = 0;
  let skip = 0;

  selectedAnswers.forEach((ans, i) => {
    if (ans === -1) skip++;
    else if (ans === questions[i].ans) { score += 1; correct++; }
    else { score -= 0.25; wrong++; }
  });

  const timeTakenSec = Math.floor((Date.now() - startTime) / 1000);
  const min = Math.floor(timeTakenSec / 60);
  const sec = timeTakenSec % 60;
  const timeStr = `${min} মিনিট ${sec} সেকেন্ড`;

  document.getElementById("scoreDisplay").textContent = score.toFixed(2);
  document.getElementById("correctCount").textContent = correct;
  document.getElementById("wrongCount").textContent = wrong;
  document.getElementById("skipCount").textContent = skip;
  document.getElementById("timeTaken").textContent = timeStr;

  const participant = {
    name: localStorage.getItem("quizName") || "Anonymous",
    dept: localStorage.getItem("quizDept") || "-",
    score,
    timeSec: timeTakenSec,
    timestamp: Date.now()
  };

  saveParticipant(participant);
  localStorage.removeItem("quizName");
  localStorage.removeItem("quizDept");

  showResult();
}

// Ranking
function renderRanking() {
  const participants = getParticipants();
  
  participants.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return a.timeSec - b.timeSec;
  });

  const tbody = document.getElementById("rankBody");
  tbody.innerHTML = "";

  participants.forEach((p, i) => {
    const tr = document.createElement("tr");
    if (i === 0) tr.className = "highlight-1";
    else if (i === 1) tr.className = "highlight-2";
    else if (i === 2) tr.className = "highlight-3";

    const timeStr = `${String(Math.floor(p.timeSec/60)).padStart(2,'0')}:${String(p.timeSec%60).padStart(2,'0')}`;

    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${p.name}</td>
      <td>${p.dept}</td>
      <td>${p.score.toFixed(2)}</td>
      <td>${timeStr}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Events
document.getElementById("regForm").addEventListener("submit", e => {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const dept = document.getElementById("dept").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name || !dept || !email) {
    alert("সব তথ্য পূরণ করুন");
    return;
  }

  localStorage.setItem("quizName", name);
  localStorage.setItem("quizDept", dept);

  startTime = Date.now();
  selectedAnswers.fill(-1);

  showQuiz();
  loadQuestion(0);
  startTimer();
});

document.getElementById("submitQuizBtn").addEventListener("click", () => {
  if (confirm("আপনি কি কুইজ জমা দিতে চান?")) {
    submitQuiz();
  }
});

function restart() {
  showHome();
  document.getElementById("regForm").reset();
}

// Initial load
showHome();
</script>
</body>
</html>
